name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  web-and-api:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Run API smoke tests
        run: |
          node server/index.mjs &
          SERVER_PID=$!
          sleep 3
          npm run test:e2e:import
          npm run test:e2e:import-security
          kill $SERVER_PID
