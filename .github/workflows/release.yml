name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test -- --run
      - run: npm run build
        env:
          GITHUB_PAGES: true
      - name: Build web
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Package web
        working-directory: dist
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          mkdir -p ../release
          # Create README
          echo "CYOA-creator Web v${VERSION}" > README.txt
          echo "Deploy to any web server. See GitHub wiki for instructions." >> README.txt
          cp README.txt README.md
          # Create deploy script
          echo '#!/bin/bash' > deploy.sh
          echo 'TARGET="${1:-/var/www/cyoa}"' >> deploy.sh
          echo 'mkdir -p "$TARGET" && cp -r . "$TARGET/"' >> deploy.sh
          chmod +x deploy.sh
          # Create .htaccess
          echo "RewriteEngine On" > .htaccess
          echo "RewriteBase /" >> .htaccess
          echo "RewriteRule ^index.html$ - [L]" >> .htaccess
          echo "RewriteCond %{REQUEST_FILENAME} !-f" >> .htaccess
          echo "RewriteCond %{REQUEST_FILENAME} !-d" >> .htaccess
          echo "RewriteRule . /index.html [L]" >> .htaccess
          # Create zip
          zip -r ../release/CYOA-creator-web-${VERSION}.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: web-artifact
          path: release/CYOA-creator-web-*.zip

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: |
          cd android-creator
          chmod +x gradlew
          ./gradlew assembleDebug
      - run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          cp android-creator/app/build/outputs/apk/debug/*.apk CYOA-creator-android-${VERSION}.apk
      - uses: actions/upload-artifact@v4
        with:
          name: android-artifact
          path: CYOA-creator-android-*.apk

  release:
    needs: [build-web, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: .
          pattern: web-artifact
          merge-multiple: false
      - uses: actions/download-artifact@v4
        with:
          path: .
          pattern: android-artifact
          merge-multiple: false
      - run: |
          ls -la
          # Find and move the zip file to root
          find . -name "*.zip" -exec mv {} . \;
          find . -name "*.apk" -exec mv {} . \;
          ls -la
        name: organize files
      - run: |
          echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        id: get_tag
      - run: |
          echo "## What's Changed" > release-notes.md
          git log --oneline -10 >> release-notes.md
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            CYOA-creator-web-*.zip
            CYOA-creator-android-*.apk
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
